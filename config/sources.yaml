    - label: coindesk
      category: catalyst
      lane: catalyst
      weight: 0.6
      assets: [crypto, btc, eth, sol]
      url: "https://www.coindesk.com/arc/outboundfeeds/rss/?outputType=xml"
      enabled: true

    # Ecosystem / protocol comms (mixed; keep low weight and treat as secondary)
