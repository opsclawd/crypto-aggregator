      lane: news
      weight: 0.2
      assets: [eth]
      url: "https://www.thedefiant.io/feed"
      enabled: true

    - label: solanafloor
      category: news
      lane: news
      weight: 0.2
      assets: [sol]
      url: "https://solanafloor.com/feed"
