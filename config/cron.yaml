# Cron definitions for crypto-aggregator.
# Source of truth — edits here must be applied to the live gateway via `cron.add` / `cron.update`.
#
# IMPORTANT: Every enabled job MUST have timeoutSeconds: 900 (15 min).
# Jobs that run longer than 15 min are killed to prevent memory exhaustion
# from overlapping runs. Keep at least 20 min gap between all enabled jobs.

defaults:
  tz: America/Edmonton
  session: isolated
  agent: default
  exact: true
  announce: false

jobs:
  # ── Morning pipeline (1:40–6:00 AM) ───────────────────────────────────────
  # 14 enabled jobs, 20 min apart, Market Map fires at 6:00 AM sharp.
  # Each has timeoutSeconds: 900 (15 min).

  - key: rss-fetch
    name: Catalyst + official RSS fetch
    cron: "40 1 * * *"
    messageFile: prompts/jobs/rss-fetch.txt
    model: 41-mini
    thinking: low
    timeoutSeconds: 900
    enabled: true

  - key: youtube-feed-fetch
    name: YouTube feed fetch
    cron: "0 2 * * *"
    messageFile: prompts/jobs/youtube-feed-fetch.txt
    model: 41-mini
    thinking: low
    timeoutSeconds: 900
    enabled: true

  - key: youtube-transcript-queue
    name: YouTube transcript queue
    cron: "20 2 * * *"
    messageFile: prompts/jobs/youtube-transcript-queue.txt
    model: 41-mini
    thinking: low
    timeoutSeconds: 900
    enabled: true

  - key: youtube-transcript-collect
    name: YouTube transcript collect (browser)
    cron: "40 2 * * *"
    messageFile: prompts/jobs/youtube-transcript-collect.txt
    model: minimax/MiniMax-M2.7
    thinking: medium
    timeoutSeconds: 900
    enabled: true

  - key: x-list-collect
    name: X analyst list collect
    cron: "0 3 * * *"
    messageFile: prompts/jobs/x-list-collect.txt
    model: 5-mini
    thinking: medium
    timeoutSeconds: 900
    enabled: true

  - key: x-account-collect
    name: X key accounts collect
    cron: "20 3 * * *"
    messageFile: prompts/jobs/x-account-collect.txt
    model: 5-mini
    thinking: medium
    timeoutSeconds: 900
    enabled: true

  - key: normalize
    name: Normalize + enrich items
    cron: "40 3 * * *"
    messageFile: prompts/jobs/normalize.txt
    model: 41-mini
    thinking: low
    timeoutSeconds: 900
    enabled: true

  - key: render-extraction-inputs
    name: Render extraction inputs (thesis/catalyst)
    cron: "0 4 * * *"
    messageFile: prompts/jobs/render-extraction-inputs.txt
    model: 41-mini
    thinking: low
    timeoutSeconds: 900
    enabled: true

  - key: youtube-ta-summarize
    name: YouTube TA summarize (Gemini)
    cron: "20 4 * * *"
    messageFile: prompts/jobs/youtube-ta-summarize.txt
    model: 41-mini
    thinking: low
    timeoutSeconds: 900
    enabled: true

  - key: extract-theses
    name: Extract TA theses (structured)
    cron: "40 4 * * *"
    messageFile: prompts/jobs/extract-theses.txt
    model: minimax/MiniMax-M2.7
    thinking: medium
    timeoutSeconds: 900
    enabled: true

  - key: extract-catalysts
    name: Extract catalysts (high-signal)
    cron: "0 5 * * *"
    messageFile: prompts/jobs/extract-catalysts.txt
    model: minimax/MiniMax-M2.7
    thinking: medium
    timeoutSeconds: 900
    enabled: true

  - key: update-thesis-ledger
    name: Update thesis ledger + delta
    cron: "20 5 * * *"
    messageFile: prompts/jobs/update-thesis-ledger.txt
    model: 41-mini
    thinking: low
    timeoutSeconds: 900
    enabled: true

  - key: render-market-map-input
    name: Render Morning Market Map input bundle
    cron: "40 5 * * *"
    messageFile: prompts/jobs/render-market-map-input.txt
    model: 41-mini
    thinking: low
    timeoutSeconds: 900
    enabled: true

  - key: morning-market-map
    name: Morning Market Map (TA-first)
    cron: "0 6 * * *"
    messageFile: prompts/jobs/morning-market-map.txt
    model: gpt
    thinking: high
    timeoutSeconds: 900
    announce: true
    channel: "${OPENCLAW_CHANNEL}"
    to: "${OPENCLAW_TO}"
    enabled: true

  # ── Afternoon pipeline (9:00–10:40 AM) ─────────────────────────────────────
  # Midday delta — material changes only

  - key: midday-delta
    name: Midday Delta (material changes only)
    cron: "0 9 * * *"
    messageFile: prompts/jobs/midday-delta.txt
    model: 5-mini
    thinking: medium
    timeoutSeconds: 900
    enabled: false

  # ── Evening pipeline (2:00–2:40 PM) ─────────────────────────────────────────
  # Second X pass (PM refresh)

  - key: x-list-collect-pm
    name: X analyst list collect (PM)
    cron: "0 14 * * *"
    messageFile: prompts/jobs/x-list-collect.txt
    model: 5-mini
    thinking: medium
    timeoutSeconds: 900
    enabled: false

  - key: x-account-collect-pm
    name: X key accounts collect (PM)
    cron: "20 14 * * *"
    messageFile: prompts/jobs/x-account-collect.txt
    model: 5-mini
    thinking: medium
    timeoutSeconds: 900
    enabled: false

  - key: normalize-pm
    name: Normalize + enrich items (PM)
    cron: "40 14 * * *"
    messageFile: prompts/jobs/normalize.txt
    model: 41-mini
    thinking: low
    timeoutSeconds: 900
    enabled: false
